name: Reusable Verify And Build

on:
  workflow_call:
    inputs:
      upload-pages-artifact:
        type: boolean
        required: false
        default: false
      run-audit:
        type: boolean
        required: false
        default: true
      require-main-ref:
        type: boolean
        required: false
        default: false
      base-path:
        type: string
        required: false
        default: /

permissions:
  contents: read

jobs:
  verify-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Enforce main branch for publish flows
        if: ${{ inputs.require-main-ref }}
        run: |
          test "${GITHUB_REF}" = "refs/heads/main" || {
            echo "::error::Pages deployment is only allowed from the main branch."
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Pages
        if: ${{ inputs.upload-pages-artifact }}
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Audit
        if: ${{ inputs.run-audit }}
        run: npm audit --audit-level=high

      - name: Self-test
        run: npm run selftest

      - name: Schema fixtures
        run: npm run schema:fixtures

      - name: Build
        env:
          BASE_PATH: ${{ inputs.base-path }}
        run: npm run build

      - name: Upload artifact
        if: ${{ inputs.upload-pages-artifact }}
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: dist
