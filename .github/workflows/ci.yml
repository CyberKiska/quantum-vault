name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/reusable-verify-build.yml
    with:
      upload-pages-artifact: false
      run-audit: true
      require-main-ref: false
      # For project Pages repos use /<repo>/.
      # For user/org Pages (<owner>.github.io) change this to "/".
      base-path: /${{ github.event.repository.name }}/
